name: CI/CD Pipeline

on:
  push:
    branches: [ salah_branch ]
  pull_request:
    branches: [ main, develop ]

env:
  PHP_VERSION: '8.2'

jobs:

  setup:
    name: "Setup - PHP 8.2 + Composer"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Installer PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: mbstring, pdo, pdo_mysql, gd, zip, curl
          ini-values: post_max_size=64M, upload_max_filesize=64M
          coverage: xdebug

      - name: Vérifier version PHP
        run: php --version

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: php-${{ env.PHP_VERSION }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            php-${{ env.PHP_VERSION }}-composer-

      - name: Installer dépendances Composer
        run: |
          if [ -f "composer.json" ]; then
            composer install --no-interaction --prefer-dist --no-progress
          else
            echo "Pas de composer.json — PHP pur, on continue"
          fi

      - name: Vérifier Bootstrap
        run: |
          FILES=$(grep -rl "bootstrap" . \
            --include="*.html" --include="*.php" 2>/dev/null || true)
          echo "Fichiers avec Bootstrap : $FILES"

  Build:

    lint-php:
      name: "1. Lint: PHP Syntaxe"
      runs-on: ubuntu-latest
      needs: [ setup ]

      steps:
        - uses: actions/checkout@v4

        - uses: shivammathur/setup-php@v2
          with:
            php-version: ${{ env.PHP_VERSION }}

        - name: Vérifier syntaxe de tous les .php
          run: |
            echo "=== Scan fichiers PHP ==="
            find . -name "*.php" \
              -not -path "./vendor/*" \
              -not -path "./.git/*" \
              -exec php -l {} \;
            echo "Syntaxe PHP OK"

    lint-html:
      name: "2. Lint: Validation HTML"
      runs-on: ubuntu-latest
      needs: [ setup ]

      steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-node@v4
          with:
            node-version: '20'

        - name: Installer html-validate
          run: npm install -g html-validate

        - name: Valider les fichiers .html
          run: |
            find . -name "*.html" \
              -not -path "./vendor/*" \
              -exec html-validate {} \; || true
            echo "HTML validé"

        - name: Détecter classes Bootstrap invalides
          run: |
            echo "=== Classes Bootstrap potentiellement incorrectes ==="
            grep -rnE 'class="[^"]*(btn-primry|btn-secodary|col-md--|row-fluid|span[0-9]|text-centre)' \
              . --include="*.html" --include="*.php" \
              --exclude-dir=vendor --exclude-dir=.git || true
            echo "Vérification Bootstrap terminée"

    lint-css:
      name: "3. Lint: CSS Custom"
      runs-on: ubuntu-latest
      needs: [ setup ]

      steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-node@v4
          with:
            node-version: '20'

        - name: Installer Stylelint
          run: |
            npm install -g stylelint stylelint-config-standard
            echo '{ "extends": ["stylelint-config-standard"] }' > .stylelintrc.json

        - name: Lint des fichiers CSS (hors Bootstrap)
          run: |
            find . -name "*.css" \
              -not -path "./vendor/*" \
              -not -name "bootstrap*" \
              -exec stylelint {} \; || true
            echo "CSS lint terminé"