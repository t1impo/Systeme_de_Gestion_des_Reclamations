name: CI/CD Pipeline

on:
  push:
    branches: salah_branch
  pull_request:
    branches: [ main, develop ]
env:
  PHP_VERSION: '8.2'

jobs:
# ÉTAPE 2 — SETUP PHP + COMPOSER + DÉPENDANCES
  setup:
    name: "Setup — PHP ${{ env.PHP_VERSION }} + Composer"
    runs-on: ubuntu-latest
    needs: [ validate-files ]
    steps:
      - uses: actions/checkout@v4

      - name: Installer PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, pdo, pdo_mysql, gd, zip, curl
          ini-values: post_max_size=64M, upload_max_filesize=64M
          coverage: xdebug

      - name: Vérifier version PHP
        run: php --version

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: php-${{ env.PHP_VERSION }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: php-${{ env.PHP_VERSION }}-composer-

      - name: Installer dépendances Composer
        run: |
          if [ -f "composer.json" ]; then
            composer install --no-interaction --prefer-dist --no-progress
          else
            echo "Pas de composer.json — PHP pur, on continue"
          fi

      - name: Vérifier Bootstrap référencé dans les vues
        run: |
          FILES=$(grep -rl "bootstrap" views/ public/ \
            --include="*.html" --include="*.php" 2>/dev/null || true)
          echo "Fichiers avec Bootstrap : $FILES"
