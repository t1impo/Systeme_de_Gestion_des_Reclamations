name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ main, develop ]

# Les variables env: globales sont accessibles dans run: et dans
# quelques champs d'action, MAIS PAS dans with: de setup-php ni
# dans le name: d'un job. Les valeurs PHP sont donc hardcodées là
# où c'est nécessaire, et centralisées ici pour les autres usages.
env:
  PHP_VERSION: '8.2'
  MYSQL_DATABASE: bd_final
  MYSQL_ROOT_PASSWORD: root
  MYSQL_USER: appuser
  MYSQL_PASSWORD: apppassword
  APP_IMAGE: kokafanta24/app-web:latest

jobs:

  # ============================================================
  # JOB 1 — Setup : PHP + Composer
  # ============================================================
  setup:
    name: "Setup - PHP 8.2 + Composer"   # valeur hardcodée : env.* interdit dans name:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Installer PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'              # valeur hardcodée : env.* non résolu dans with: de cette action
          extensions: mbstring, pdo, pdo_mysql, gd, zip, curl
          ini-values: post_max_size=64M, upload_max_filesize=64M
          coverage: xdebug

      - name: Vérifier version PHP
        run: php --version

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          # hashFiles et env.* sont bien supportés dans actions/cache
          key: php-${{ env.PHP_VERSION }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            php-${{ env.PHP_VERSION }}-composer-

      - name: Installer dépendances Composer
        run: |
          if [ -f "composer.json" ]; then
            composer install --no-interaction --prefer-dist --no-progress
          else
            echo "Pas de composer.json — PHP pur, on continue"
          fi

      - name: Vérifier présence de Bootstrap
        run: |
          FILES=$(grep -rl "bootstrap" . \
            --include="*.html" --include="*.php" 2>/dev/null || true)
          echo "Fichiers avec Bootstrap : $FILES"

  # ============================================================
  # JOB 2 — Build : Lint + Image Docker
  # ============================================================
  build:
    name: "Build + Lint (PHP / HTML / CSS)"
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4

      # ----- LINT PHP -----
      - name: Installer PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'              # même raison : hardcodé ici aussi

      - name: Lint PHP
        run: |
          echo "=== LINT PHP ==="
          find . -name "*.php" \
            -not -path "./vendor/*" \
            -not -path "./.git/*" \
            -exec php -l {} \;
          echo "PHP OK"

      # ----- LINT HTML -----
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer html-validate
        run: npm install -g html-validate

      - name: Lint HTML
        run: |
          echo "=== LINT HTML ==="
          find . -name "*.html" \
            -not -path "./vendor/*" \
            -exec html-validate {} \; || true
          echo "HTML OK"

      - name: Détecter classes Bootstrap invalides
        run: |
          echo "=== Bootstrap check ==="
          grep -rnE 'class="[^"]*(btn-primry|btn-secodary|col-md--|row-fluid|span[0-9]|text-centre)' \
            . --include="*.html" --include="*.php" \
            --exclude-dir=vendor --exclude-dir=.git || true
          echo "Bootstrap OK"

      # ----- LINT CSS -----
      - name: Installer Stylelint
        run: |
          npm install -g stylelint stylelint-config-standard
          echo '{ "extends": ["stylelint-config-standard"] }' > .stylelintrc.json

      - name: Lint CSS
        run: |
          echo "=== LINT CSS ==="
          find . -name "*.css" \
            -not -path "./vendor/*" \
            -not -name "bootstrap*" \
            -exec stylelint {} \; || true
          echo "CSS OK"

      # ----- DOCKER BUILD & PUSH -----
      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build et Push image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.APP_IMAGE }}

 # ============================================================
  # JOB 3 — Tests : DB + Web
  # ============================================================
  test:
    name: "Test - PHP + MySQL"
    runs-on: ubuntu-latest
    needs: build

    # ✅ MySQL lancé comme service GitHub Actions → accessible sur 127.0.0.1:3306
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: ${{ env.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ env.MYSQL_DATABASE }}
          MYSQL_USER: ${{ env.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ env.MYSQL_PASSWORD }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -proot"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, gd, zip, curl
          coverage: xdebug

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: php-${{ env.PHP_VERSION }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            php-${{ env.PHP_VERSION }}-composer-

      - name: Installer dépendances Composer
        run: |
          if [ -f "composer.json" ]; then
            composer install --no-interaction --prefer-dist --no-progress
          else
            echo "Pas de composer.json — PHP pur, on continue"
          fi

      # ----- Importer le schéma SQL -----
      - name: Importer la base de données
        run: |
          if [ ! -f bd.sql ]; then
            echo "Fichier bd.sql introuvable — skip."
          else
            mysql \
              -h 127.0.0.1 \
              -u ${{ env.MYSQL_USER }} \
              -p${{ env.MYSQL_PASSWORD }} \
              ${{ env.MYSQL_DATABASE }} < bd.sql
            echo "Base importée avec succès."
          fi
      # ----- Vérification tables -----
      - name: Vérifier les tables créées
        run: |
          mysql \
            -h 127.0.0.1 \
            -u ${{ env.MYSQL_USER }} \
            -p${{ env.MYSQL_PASSWORD }} \
            ${{ env.MYSQL_DATABASE }} \
            -e "SHOW TABLES;"

      # ----- Docker réseau pour l'app web -----
      - name: Créer le réseau Docker
        run: docker network create app-net

      - name: Démarrer le conteneur applicatif
        run: |
          docker run -d \
            --name app \
            --network app-net \
            -p 8080:80 \
            -e DB_HOST=172.17.0.1 \
            -e DB_NAME=${{ env.MYSQL_DATABASE }} \
            -e DB_USER=${{ env.MYSQL_USER }} \
            -e DB_PASS=${{ env.MYSQL_PASSWORD }} \
            ${{ env.APP_IMAGE }}

      # ----- Test HTTP -----
      - name: Attendre que l'application soit disponible
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "Application disponible."
              break
            fi
            echo "  tentative $i — en attente..."
            sleep 3
          done

      - name: Test page de login (HTTP 200)
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:8080/index/login_page.php)
          echo "Code HTTP reçu : $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "ERREUR : la page n'a pas retourné 200."
            docker logs app
            exit 1
          fi

      # ----- PHPUnit -----
      - name: Run PHPUnit tests
        env:
          DB_HOST: 127.0.0.1       
          DB_NAME: ${{ env.MYSQL_DATABASE }}
          DB_USER: ${{ env.MYSQL_USER }}
          DB_PASS: ${{ env.MYSQL_PASSWORD }}
          # vendor/bin/phpunit tests/Functional/HttpTest.php
        run: |
              vendor/bin/phpunit tests/Unit/testlogin.php
          
      # vendor/bin/phpunit tests/Integration/DbConnectionTest.php
      # vendor/bin/phpunit tests/Functional/HttpTest.php
              


      # ----- Logs en cas d'échec -----
      - name: Afficher les logs si échec
        if: failure()
        run: |
          echo "=== Logs App ==="
          docker logs app || true
        