name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [develop]

# OIDC : autorise GitHub a generer un JWT pour assumer le role AWS sans cle long-vie
permissions:
  id-token: write
  contents: read

env:
  PHP_VERSION: '8.2'
  MYSQL_DATABASE: bd_final
  MYSQL_ROOT_PASSWORD: root
  MYSQL_USER: appuser
  MYSQL_PASSWORD: apppassword
  APP_IMAGE: 023036696848.dkr.ecr.us-east-1.amazonaws.com/php-app:latest
  AWS_REGION: us-east-1
  ECR_REPOSITORY: php-app

# ================================================================
# JOB 1 — SETUP : PHP + Composer
# ================================================================
jobs:
  setup:
    name: "Setup"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, gd, zip, curl
          ini-values: post_max_size=64M, upload_max_filesize=64M
          coverage: xdebug

      - name: Vérifier version PHP
        run: php --version

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: php-${{ env.PHP_VERSION }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: php-${{ env.PHP_VERSION }}-composer-

      - name: Installer dépendances Composer
        run: |
          if [ -f composer.json ]; then
            composer install --no-interaction --prefer-dist --no-progress
          else
            echo "Pas de composer.json — PHP pur, on continue"
          fi

      - name: Vérifier présence de Bootstrap
        run: |
          FILES=$(grep -rl "bootstrap" . --include="*.html" --include="*.php" 2>/dev/null || true)
          echo "Fichiers avec Bootstrap : $FILES"

# ================================================================
# JOB 2 — BUILD : Lint + Image Docker
# ================================================================
  build:
    name: "Build"
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      # --- PHP ---
      - name: Installer PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Lint PHP
        run: |
          echo "=== LINT PHP ==="
          find . -name "*.php" \
            -not -path "./vendor/*" \
            -not -path "./.git/*" \
            -exec php -l {} \;
          echo "PHP OK"

      # --- HTML ---
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint HTML
        run: |
          npm install -g html-validate
          echo "=== LINT HTML ==="
          find . -name "*.html" -not -path "./vendor/*" \
            -exec html-validate {} \; || true
          echo "HTML OK"

      - name: Détecter classes Bootstrap invalides
        run: |
          echo "=== Bootstrap check ==="
          grep -rnE 'class="[^"]*(btn-primry|btn-secodary|col-md--|row-fluid|span[0-9]|text-centre)' \
            . --include="*.html" --include="*.php" \
            --exclude-dir=vendor --exclude-dir=.git || true
          echo "Bootstrap OK"

      # --- CSS ---
      - name: Lint CSS
        run: |
          npm install -g stylelint stylelint-config-standard
          echo '{ "extends": ["stylelint-config-standard"] }' > .stylelintrc.json
          echo "=== LINT CSS ==="
          find . -name "*.css" \
            -not -path "./vendor/*" \
            -not -name "bootstrap*" \
            -exec stylelint {} \; || true
          echo "CSS OK"

      # --- Docker / Amazon ECR ---
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::023036696848:role/cd-php-app-github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build et Push image Docker vers ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ env.ECR_REPOSITORY }}
        run: |
          TAG=${GITHUB_SHA::7}
          docker build -t $REGISTRY/$REPOSITORY:${TAG} -t $REGISTRY/$REPOSITORY:latest .
          docker push $REGISTRY/$REPOSITORY:${TAG}
          docker push $REGISTRY/$REPOSITORY:latest

# ================================================================
# JOB 3 — TEST : DB + Web + PHPUnit
# ================================================================
  test:
    name: "Test"
    runs-on: ubuntu-latest
    needs: build

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: ${{ env.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ env.MYSQL_DATABASE }}
          MYSQL_USER: ${{ env.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ env.MYSQL_PASSWORD }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -proot"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, gd, zip, curl
          coverage: xdebug

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: php-${{ env.PHP_VERSION }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: php-${{ env.PHP_VERSION }}-composer-

      - name: Installer dépendances Composer
        run: |
          if [ -f composer.json ]; then
            composer install --no-interaction --prefer-dist --no-progress
          else
            echo "Pas de composer.json — PHP pur, on continue"
          fi

      # --- Base de données ---
      - name: Importer la base de données
        run: |
          if [ ! -f bd.sql ]; then
            echo "Fichier bd.sql introuvable — skip."
          else
            mysql -h 127.0.0.1 \
              -u ${{ env.MYSQL_USER }} \
              -p${{ env.MYSQL_PASSWORD }} \
              ${{ env.MYSQL_DATABASE }} < bd.sql
            echo "Base importée avec succès."
          fi

          
      # - name: Vérifier les tables créées
      #   run: |
      #     mysql -h 127.0.0.1 \
      #       -u ${{ env.MYSQL_USER }} \
      #       -p${{ env.MYSQL_PASSWORD }} \
      #       ${{ env.MYSQL_DATABASE }} \
      #       -e "SHOW TABLES;"

      # --- Login ECR pour pull l'image buildee dans le job 'build' ---
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::023036696848:role/cd-php-app-github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # --- Conteneur applicatif ---
      - name: Créer le réseau Docker
        run: docker network create app-net

      - name: Démarrer le conteneur applicatif (avec la nouvelle image)
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ env.ECR_REPOSITORY }}
        run: |
          TAG=${GITHUB_SHA::7}
          docker run -d \
            --name app \
            --network app-net \
            --add-host=host.docker.internal:host-gateway \
            -p 8080:80 \
            -e DB_HOST=host.docker.internal \
            -e DB_NAME=${{ env.MYSQL_DATABASE }} \
            -e DB_USER=${{ env.MYSQL_USER }} \
            -e DB_PASS=${{ env.MYSQL_PASSWORD }} \
            $REGISTRY/$REPOSITORY:${TAG}

      # --- Health check ---
      - name: Attendre que l'application soit disponible
        run: |
          sleep 5
          for i in $(seq 1 20); do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
              http://localhost:8080/index/login_page.php 2>/dev/null || echo "000")
            echo "  tentative $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Application disponible."
              break
            fi
            if [ $i -eq 20 ]; then
              echo "ERREUR : timeout, application non disponible."
              docker logs app
              exit 1
            fi
            sleep 3
          done

      - name: Test page de login (HTTP 200)
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
            http://localhost:8080/index/login_page.php)
          echo "Code HTTP reçu : $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "ERREUR : la page n'a pas retourné 200."
            docker logs app
            exit 1
          fi

      # --- PHPUnit ---
      - name: Run PHPUnit tests
        env:
          DB_HOST: 127.0.0.1
          DB_NAME: ${{ env.MYSQL_DATABASE }}
          DB_USER: ${{ env.MYSQL_USER }}
          DB_PASS: ${{ env.MYSQL_PASSWORD }}
        run: |
          vendor/bin/phpunit tests/Unit/DbHelperTest.php
          vendor/bin/phpunit tests/Unit/testlogin.php
          vendor/bin/phpunit tests/Integration/DbConnectionTest.php
          vendor/bin/phpunit tests/Functional/HttpTest.php
          vendor/bin/phpunit tests/Security/SecurityTest.php

      - name: Afficher les logs si échec
        if: failure()
        run: docker logs app || true

# ================================================================
# JOB 4 — DEPLOY : Deploiement direct sur ECS Fargate (push CD)
# ================================================================
  deploy:
    name: "Deploy to ECS"
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::023036696848:role/cd-php-app-github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Compute short SHA (meme tag que le job build)
        id: short-sha
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition cd-php-app-app \
            --query taskDefinition \
            > task-definition.json

      - name: Render new task definition with the freshly built image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: php-app
          image: 023036696848.dkr.ecr.us-east-1.amazonaws.com/php-app:${{ steps.short-sha.outputs.sha }}

      - name: Deploy to ECS service (register revision + update + wait)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: cd-php-app-service
          cluster: cd-php-app-cluster
          wait-for-service-stability: true
          wait-for-minutes: 10